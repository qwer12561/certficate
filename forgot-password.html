<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Certificate Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=111">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a192f 0%, #172a45 100%);
            margin: 0;
            padding: 20px;
        }

        .forgot-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .success-message {
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }

        .error-message {
            background: rgba(255, 75, 75, 0.1);
            border: 1px solid rgba(255, 75, 75, 0.3);
            color: #ff4b4b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--accent-color);
        }
    </style>
</head>

<body>
    <div class="forgot-container">
        <div class="header">
            <span style="font-size: 3rem;">🔑</span>
            <h1>Forgot Password</h1>
            <p>Enter your Gmail and we'll send you a reset link.</p>
        </div>

        <div id="success-msg" class="success-message"></div>
        <div id="error-msg" class="error-message"></div>

        <form id="forgot-form" class="professional-form">
            <div class="form-group">
                <label for="email">Gmail</label>
                <input type="email" id="email" name="email" placeholder="Enter your Gmail address" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;" id="submit-btn">
                <span class="btn-text">Send Reset Link</span>
            </button>
        </form>

        <a href="login.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const successMsg = document.getElementById('success-msg');
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = submitBtn.querySelector('.btn-text');

            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            btnText.textContent = 'Sending...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('api/forgot_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (data.success) {
                    successMsg.innerHTML = data.message + `
                        <div style="margin-top: 1.5rem;">
                            <a href="${data.debug_link}" class="btn-primary" style="display: inline-block; padding: 0.6rem 1.2rem; font-size: 0.9rem; text-decoration: none; border-radius: 8px;">Proceed to Reset</a>
                        </div>`;
                    successMsg.style.display = 'block';
                    document.getElementById('forgot-form').reset();
                } else {
                    errorMsg.textContent = data.error || 'Failed to request password reset';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                btnText.textContent = 'Send Reset Link';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
