<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a192f">
    <title>Reprint Certificate - Certificate Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=107">
</head>

<body>
    <div class="video-bg">
        <div class="overlay"></div>
    </div>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="index.html" class="sidebar-logo">
                <span class="logo-icon">📜</span>
                <span class="logo-text">Certificate System</span>
            </a>
            <nav class="sidebar-nav">
                <a href="create.html" class="nav-item">
                    <i>➕</i> <span>Create New</span>
                </a>
                <a href="view.html" class="nav-item">
                    <i>📂</i> <span>View All</span>
                </a>
                <a href="reprint.html" class="nav-item active">
                    <i>🖨️</i> <span>Reprint</span>
                </a>
                <a href="training_tracker.html" class="nav-item">
                    <i>📊</i> <span>Training Tracker</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>&copy; 2026 Certificate System</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="header" style="text-align: left; margin-bottom: 2rem;">
                <h1 class="title">Reprint Certificate</h1>
                <p class="subtitle">Search and generate print-ready certificates</p>
            </header>

            <section class="search-section">
                <div class="search-card">
                    <input type="text" id="reprint-search" placeholder="Enter Certificate ID or Recipient Name">
                    <button id="btn-search" class="btn-primary" style="margin-top: 0;">Search</button>
                </div>
            </section>

            <div id="reprint-preview-container" class="reprint-preview" style="display: none;">
                <div class="action-bar">
                    <button id="btn-print" class="btn-primary">🖨 Print Certificate</button>
                    <button id="btn-download" class="btn-small">Download PDF</button>
                </div>

                <div id="certificate-to-print" class="certificate-container print-ready">
                    <!-- Certificate content will be injected here -->
                </div>
            </div>

            <div id="no-result" class="empty-state" style="display: none;">
                <p>No certificate found with that information.</p>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="notifications.js?v=1"></script>
    <script src="reprint.js?v=107"></script>
</body>

</html>
