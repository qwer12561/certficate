<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Certificate Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=116">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a192f 0%, #172a45 100%);
            margin: 0;
            padding: 20px;
        }

        .reset-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .success-message {
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }

        .error-message {
            background: rgba(255, 75, 75, 0.1);
            border: 1px solid rgba(255, 75, 75, 0.3);
            color: #ff4b4b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }

        #reset-form {
            display: none;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <div class="header">
            <span style="font-size: 3rem;">🔐</span>
            <h1>Reset Password</h1>
            <p>Enter your new password below.</p>
        </div>

        <div id="success-msg" class="success-message"></div>
        <div id="error-msg" class="error-message"></div>

        <div id="token-status" class="text-secondary" style="text-align: center; display: none;">Validating...</div>

        <form id="reset-form" class="professional-form" style="display: block;">
            <div class="form-group">
                <label for="email">Gmail</label>
                <input type="email" id="email" name="email" placeholder="Your Gmail address" required readonly
                    style="opacity: 0.7; background: rgba(255,255,255,0.05);">
            </div>
            <div class="form-group">
                <label for="verification_code">6-Digit Security Code</label>
                <input type="text" id="verification_code" name="verification_code" placeholder="Enter the 6-digit code"
                    required maxlength="6" pattern="\d{6}"
                    style="letter-spacing: 3px; font-weight: bold; text-align: center;">
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new_password" name="new_password" placeholder="Enter new password"
                        required class="toggle-input">
                    <button type="button" class="password-toggle" onclick="togglePassword('new_password', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm_password" placeholder="Confirm new password" required
                        class="toggle-input">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm_password', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;" id="submit-btn">
                <span class="btn-text">Update Password</span>
            </button>
        </form>

        <a href="login.html" id="login-link" class="back-link"
            style="display: none; text-align: center; margin-top: 1.5rem; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">←
            Go to Login</a>
    </div>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);

            if (type === 'text') {
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>`;
            } else {
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>`;
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const tokenStatus = document.getElementById('token-status');
        const resetForm = document.getElementById('reset-form');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const submitBtn = document.getElementById('submit-btn');
        const loginLink = document.getElementById('login-link');
        const emailInput = document.getElementById('email');

        if (email) {
            emailInput.value = email;
        }

        // Form Submission
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const verification_code = document.getElementById('verification_code').value;
            const password = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password !== confirm) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }

            const btnText = submitBtn.querySelector('.btn-text');
            errorMsg.style.display = 'none';
            btnText.textContent = 'Updating...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('api/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value,
                        code: verification_code,
                        password
                    })
                });
                const data = await response.json();

                if (data.success) {
                    successMsg.textContent = 'Password reset successfully! You can now log in.';
                    successMsg.style.display = 'block';
                    resetForm.style.display = 'none';
                    loginLink.style.display = 'block';
                } else {
                    errorMsg.textContent = data.error || 'Failed to reset password';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    btnText.textContent = 'Update Password';
                }
            } catch (err) {
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                btnText.textContent = 'Update Password';
            }
        });
    </script>
</body>

</html>
