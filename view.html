<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Certificates - Certificate Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="video-bg">
        <div class="overlay"></div>
    </div>
    <main class="container">
        <header class="header" style="text-align: left; margin-bottom: 2rem;">
            <a href="index.html" class="back-link">← Back to Menu</a>
            <h1 class="title">Issued Certificates</h1>
            <p class="subtitle">History of all generated certificates</p>
        </header>

        <div class="view-controls">
            <div class="search-box">
                <input type="text" id="view-search" placeholder="Search by recipient or title...">
            </div>
            <div class="sort-box">
                <select id="view-sort">
                    <option value="newest" selected>Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="name">Recipient Name</option>
                </select>
            </div>
        </div>

        <div id="certificates-list" class="certificates-grid">
            <!-- Dynamic content will be injected here -->
            <div class="loading-state">
                <p>Loading certificates...</p>
            </div>
        </div>
    </main>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-cert-container" class="modal-cert-preview">
                <!-- Certificate will be rendered here -->
            </div>
            <div class="modal-actions">
                <button id="modal-print-btn" class="btn-primary">Print Certificate</button>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="view.js"></script>
</body>

</html>
