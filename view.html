<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a192f">
    <title>View Certificates - Certificate Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=107">
</head>

<body>
    <div class="video-bg">
        <div class="overlay"></div>
    </div>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="index.html" class="sidebar-logo">
                <span class="logo-icon">📜</span>
                <span class="logo-text">Certificate System</span>
            </a>
            <nav class="sidebar-nav">
                <a href="create.html" class="nav-item">
                    <i>➕</i> <span>Create New</span>
                </a>
                <a href="view.html" class="nav-item active">
                    <i>📂</i> <span>View All</span>
                </a>
                <a href="reprint.html" class="nav-item">
                    <i>🖨️</i> <span>Reprint</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>&copy; 2026 Certificate System</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="header" style="text-align: left; margin-bottom: 2rem;">
                <h1 class="title">Issued Certificates</h1>
                <p class="subtitle">History of all generated certificates</p>
            </header>

            <div class="view-controls">
                <div class="search-box">
                    <input type="text" id="view-search" placeholder="Search by recipient or title...">
                </div>
                <div class="sort-box">
                    <select id="view-sort">
                        <option value="newest" selected>Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="name">Recipient Name</option>
                    </select>
                </div>
            </div>

            <div id="certificates-list" class="certificates-grid">
                <!-- Dynamic content will be injected here -->
                <div class="loading-state">
                    <p>Loading certificates...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-cert-container" class="modal-cert-preview">
                <!-- Certificate will be rendered here -->
            </div>
            <div class="modal-actions">
                <button id="modal-print-btn" class="btn-primary">Print Certificate</button>
                <button id="modal-download-btn" class="btn-secondary">Download PDF</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="notifications.js?v=1"></script>
    <script src="view.js?v=107"></script>
</body>

</html>
